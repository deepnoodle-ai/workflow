name: demo
description: A demo workflow
state:
  counter: 1
outputs:
  - name: counter
steps:
  - name: Start
    activity: print
    parameters:
      message: 'The workflow is running. The initial counter value is ${state.counter}.'
    next:
      - step: Wait

  - name: Wait
    activity: wait
    parameters:
      seconds: 0.5
    next:
      - step: PrintResult

  - name: PrintResult
    activity: print
    parameters:
      message: 'Workflow completed! Counter: ${state.counter}'
